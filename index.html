<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Loader</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    width:80px;
    margin-bottom:60px;
}

.loader{
    position:relative;
    width:40px;
    height:40px;
}

.loader div{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    top:50%;
    left:50%;
    animation: spin 1.2s linear infinite;
}

.loader div:nth-child(1){animation-delay:0s;}
.loader div:nth-child(2){animation-delay:0.15s;}
.loader div:nth-child(3){animation-delay:0.3s;}
.loader div:nth-child(4){animation-delay:0.45s;}
.loader div:nth-child(5){animation-delay:0.6s;}

@keyframes spin{
    0%{
        transform: rotate(0deg) translate(18px) rotate(0deg);
    }
    100%{
        transform: rotate(360deg) translate(18px) rotate(-360deg);
    }
}
</style>
</head>

<body>

<img class="logo" src="windows.png">

<div class="loader">
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
</div>

</body>
</html>
